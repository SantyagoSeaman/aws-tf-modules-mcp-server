name: Scorecard

# OpenSSF Scorecard — supply-chain / security-health analysis.
# Publishes the score to the public OpenSSF API so the README badge works.
on:
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # weekly, Monday 07:20 UTC
  push:
    branches: ["master"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # publish results to the OpenSSF API (required for the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
