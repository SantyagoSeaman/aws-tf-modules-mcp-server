name: Scorecard

# OpenSSF Scorecard — supply-chain / security-health analysis.
# Publishes the score to the public OpenSSF API so the README badge works.
on:
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # weekly, Monday 07:20 UTC
  push:
    branches: ["master"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # publish results to the OpenSSF API (required for the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
