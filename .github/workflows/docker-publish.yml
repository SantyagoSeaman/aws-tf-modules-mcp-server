name: Publish Docker image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"

      - name: Check that tag matches project version
        run: |
          VERSION=$(uv run --no-project python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $VERSION" >&2
            exit 1
          fi
          echo "IMAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU (for linux/arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch since 0.15.1: linux/amd64 +
      # linux/arm64 (Apple-Silicon demand confirmed). This workflow runs on an amd64
      # GitHub-hosted runner, so QEMU emulates the arm64 leg -- slower than a native arm64
      # runner would be, but no extra infra to maintain.
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/santyagoseaman/tfmodsearch:${{ env.IMAGE_VERSION }}
            ghcr.io/santyagoseaman/tfmodsearch:latest
