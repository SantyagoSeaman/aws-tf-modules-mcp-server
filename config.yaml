# TFModSearch MCP Server Configuration
#
# Default embedding model: intfloat/e5-small-v2
# Model is configured at index build time via CLI --model argument

# Logging level for application loggers
# Third-party loggers (fakeredis, docket, asyncio) are always set to WARNING
# Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: INFO

# Optional query instruction prefix, prepended to the query before embedding.
# Set to null/empty to disable (default). Benchmarked with e5-small-v2's own
# "query: " / "passage: " convention on this corpus — no measurable retrieval
# gain over leaving this unset, so it stays disabled. For BGE models, the
# equivalent instruction is:
# query_instruction: "Represent this sentence for searching relevant passages: "
query_instruction: null

# Search scoring weights (default values)
# These control how different search components are weighted
search_weights:
  # Weight for keyword overlap with IDF weighting
  w_kw: 1.0

  # Weight for exact module name match boost
  w_exact: 3.0

  # Weight for BM25 text relevance
  w_bm25: 2.0

  # Weight for semantic similarity (cosine similarity of embeddings)
  w_sem: 3.0

# Disk cache directory for grep_module_docs's live Terraform Registry document
# fetches. Set to null/omit to use the default:
# ${TFMODSEARCH_CACHE_DIR:-${XDG_CACHE_HOME:-~/.cache}}/tfmodsearch/registry_docs
doc_cache_dir: null

# TTL (hours) for "latest" (unpinned) grep_module_docs cache entries before a
# refetch is triggered. Pinned versions are immutable and always cached forever
# regardless of this value. Default: 24
doc_cache_ttl_hours: 24
